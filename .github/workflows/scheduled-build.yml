name: Scheduled GitHub Pages Build

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  schedule:
    # Runs every day at midnight UTC
    - cron: "0 0 * * *"
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: read
  pages: write
  id-token: write
  issues: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.1"
          bundler-cache: true

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Build with Jekyll
        run: bundle exec jekyll build
        env:
          JEKYLL_ENV: production

      - name: Check for newly published posts
        id: check-new-posts
        if: github.event_name == 'schedule'
        run: |
          TODAY=$(date -u +"%Y-%m-%d")
          NEW_POSTS=$(find _posts -name "${TODAY}-*" -type f | sort)
          if [ -n "$NEW_POSTS" ]; then
            echo "found=true" >> "$GITHUB_OUTPUT"
            # Build a markdown list of published post titles
            POST_LIST=""
            for f in $NEW_POSTS; do
              TITLE=$(grep -m1 '^title:' "$f" | sed 's/^title:[[:space:]]*//' | sed 's/^["'\'']//' | sed 's/["'\'']$//')
              POST_LIST="${POST_LIST}- **${TITLE}**\n"
            done
            echo "post_list<<EOF" >> "$GITHUB_OUTPUT"
            echo -e "$POST_LIST" >> "$GITHUB_OUTPUT"
            echo "EOF" >> "$GITHUB_OUTPUT"
          else
            echo "found=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Notify about newly published posts
        if: github.event_name == 'schedule' && steps.check-new-posts.outputs.found == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const today = new Date().toISOString().split('T')[0];
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `📝 Scheduled publish: new post(s) went live on ${today}`,
              body: `The daily scheduled build published the following post(s):\n\n${{ steps.check-new-posts.outputs.post_list }}\n\n🔗 [View site](https://${context.repo.owner}.github.io/)\n📋 [Build run](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})`,
              labels: ['automated', 'published']
            });

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
