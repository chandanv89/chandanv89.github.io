<head>
  <meta charset="utf-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <script>
    // Apply theme before render to prevent flash
    (function () {
      var t = localStorage.getItem("theme");
      if (t === "light" || t === "dark") {
        document.documentElement.setAttribute("data-theme", t);
      } else if (window.matchMedia("(prefers-color-scheme: dark)").matches) {
        document.documentElement.setAttribute("data-theme", "dark");
      } else {
        document.documentElement.setAttribute("data-theme", "light");
      }
    })();
  </script>
  {%- seo -%}
  <link
    id="main-stylesheet"
    rel="stylesheet"
    href="{{ '/assets/css/style.css' | relative_url }}"
  />
  {%- feed_meta -%} {%- if jekyll.environment == 'production' and
  site.google_analytics -%} {%- include google-analytics.html -%} {%- endif -%}

  <script type="module">
    import mermaid from "https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.esm.min.mjs";

    function getMermaidTheme() {
      var dt = document.documentElement.getAttribute("data-theme");
      if (dt === "dark") return "dark";
      if (dt === "light") return "default";
      return window.matchMedia("(prefers-color-scheme: dark)").matches
        ? "dark"
        : "default";
    }

    // Store original diagram sources before first render
    const diagrams = document.querySelectorAll(".language-mermaid");
    const sources = Array.from(diagrams).map((el) => el.textContent);

    async function renderMermaid() {
      const theme = getMermaidTheme();
      mermaid.initialize({ startOnLoad: false, theme });

      // Restore original source text and reset processed state
      diagrams.forEach((el, i) => {
        el.removeAttribute("data-processed");
        el.innerHTML = sources[i];
      });

      await mermaid.run({ nodes: Array.from(diagrams) });
    }

    await renderMermaid();

    // Re-render when system theme changes
    window
      .matchMedia("(prefers-color-scheme: dark)")
      .addEventListener("change", () => renderMermaid());

    // Re-render when theme is toggled manually
    window.addEventListener("themechange", () => renderMermaid());
  </script>
