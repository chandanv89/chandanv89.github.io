<button
  id="theme-toggle"
  class="theme-toggle"
  aria-label="Toggle dark mode"
  title="Toggle dark mode"
>
  <svg
    class="theme-toggle-icon sun-icon"
    xmlns="http://www.w3.org/2000/svg"
    width="20"
    height="20"
    viewBox="0 0 24 24"
    fill="none"
    stroke="currentColor"
    stroke-width="2"
    stroke-linecap="round"
    stroke-linejoin="round"
  >
    <circle cx="12" cy="12" r="5" />
    <line x1="12" y1="1" x2="12" y2="3" />
    <line x1="12" y1="21" x2="12" y2="23" />
    <line x1="4.22" y1="4.22" x2="5.64" y2="5.64" />
    <line x1="18.36" y1="18.36" x2="19.78" y2="19.78" />
    <line x1="1" y1="12" x2="3" y2="12" />
    <line x1="21" y1="12" x2="23" y2="12" />
    <line x1="4.22" y1="19.78" x2="5.64" y2="18.36" />
    <line x1="18.36" y1="5.64" x2="19.78" y2="4.22" />
  </svg>
  <svg
    class="theme-toggle-icon moon-icon"
    xmlns="http://www.w3.org/2000/svg"
    width="20"
    height="20"
    viewBox="0 0 24 24"
    fill="none"
    stroke="currentColor"
    stroke-width="2"
    stroke-linecap="round"
    stroke-linejoin="round"
  >
    <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z" />
  </svg>
</button>

<script>
  (function () {
    var toggle = document.getElementById("theme-toggle");
    var root = document.documentElement;

    function getSystemTheme() {
      return window.matchMedia("(prefers-color-scheme: dark)").matches
        ? "dark"
        : "light";
    }

    function getEffectiveTheme() {
      var stored = localStorage.getItem("theme");
      if (stored === "light" || stored === "dark") return stored;
      return getSystemTheme();
    }

    function applyTheme(theme) {
      root.setAttribute("data-theme", theme);
      toggle.setAttribute(
        "aria-label",
        theme === "dark" ? "Switch to light mode" : "Switch to dark mode",
      );
    }

    // Apply on load (runs inline, so no flash)
    applyTheme(getEffectiveTheme());

    toggle.addEventListener("click", function () {
      var current = getEffectiveTheme();
      var next = current === "dark" ? "light" : "dark";
      // If user picks the same as system, clear storage so it stays auto
      if (next === getSystemTheme()) {
        localStorage.removeItem("theme");
      } else {
        localStorage.setItem("theme", next);
      }
      applyTheme(next);

      // Dispatch event so other scripts (e.g. mermaid) can react
      window.dispatchEvent(
        new CustomEvent("themechange", { detail: { theme: next } }),
      );
    });

    // When system theme changes, update if user hasn't overridden
    window
      .matchMedia("(prefers-color-scheme: dark)")
      .addEventListener("change", function () {
        if (!localStorage.getItem("theme")) {
          applyTheme(getSystemTheme());
          window.dispatchEvent(
            new CustomEvent("themechange", {
              detail: { theme: getSystemTheme() },
            }),
          );
        }
      });
  })();
</script>
